<div class="settings-panel full-width">
    <div class="panel-header mb-5">
        <div class="panel-icon text-primary bg-primary-light">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
        </div>
        <div>
            <h3 class="panel-title">Compliance Configuration</h3>
            <p class="panel-desc">Configure AI analysis and LTA compliance standards</p>
        </div>
    </div>

    <div class="notifications-list mb-4">
        <div class="notification-item">
            <div class="notification-info">
                <h4 class="text-white font-semibold">Automatic Analysis</h4>
                <p>Run AI analysis immediately after upload</p>
            </div>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider round"></span>
            </label>
        </div>

        <div class="notification-item border-none">
            <div class="notification-info">
                <h4 class="text-white font-semibold">Strict Mode</h4>
                <p>Apply stricter compliance thresholds</p>
            </div>
            <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
            </label>
        </div>
    </div>

    <div class="email-notification-section">
        <div class="form-group mb-4">
            <label class="mb-2 font-semibold">LTA Standards Version</label>
            <select class="settings-select w-100">
                <option>LTA Standards 2024 (Current)</option>
                <option>LTA Standards 2023</option>
                <option>LTA Standards 2022</option>
            </select>
        </div>

        <div class="form-group mb-4">
            <label class="mb-2 font-semibold">Recommendation Threshold</label>
            <select class="settings-select w-100">
                <option>Medium and Above</option>
                <option>High only</option>
                <option>All recommendations</option>
            </select>
        </div>

        <div class="panel-footer btn-settings-footer">
            <button type="button" class="btn btn-primary w-100 btn-settings">Save Compliance Settings</button>
        </div>
    </div>
</div>
