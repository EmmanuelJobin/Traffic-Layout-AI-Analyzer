<div class="settings-grid">
    <!-- Regional Settings Panel -->
    <div class="settings-panel">
        <div class="panel-header mb-4">
            <div class="panel-icon text-primary bg-primary-light">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c1.96-1.66 3.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm1.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
            </div>
            <div>
                <h3 class="panel-title">Regional Settings</h3>
                <p class="panel-desc">Configure language, timezone, and format preferences</p>
            </div>
        </div>

        <form class="settings-form">
            <div class="form-group">
                <label>Language</label>
                <select class="settings-select w-100">
                    <option>English (Singapore)</option>
                    <option>English (US)</option>
                    <option>English (UK)</option>
                </select>
            </div>
            
            <div class="form-group mt-3">
                <label>Timezone</label>
                <select class="settings-select w-100">
                    <option>Singapore (GMT+8)</option>
                    <option>Tokyo (GMT+9)</option>
                    <option>London (GMT+0)</option>
                </select>
            </div>

            <div class="form-group mt-3">
                <label>Date Format</label>
                <select class="settings-select w-100">
                    <option>DD/MM/YYYY</option>
                    <option>MM/DD/YYYY</option>
                    <option>YYYY-MM-DD</option>
                </select>
            </div>
        </form>

        <div class="panel-footer mt-4">
            <button type="button" class="btn btn-primary w-100 btn-settings">Save Regional Settings</button>
        </div>
    </div>

    <!-- Appearance Panel -->
    <div class="settings-panel">
        <div class="panel-header mb-4">
            <div class="panel-icon text-primary bg-primary-light">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            </div>
            <div>
                <h3 class="panel-title">Appearance</h3>
                <p class="panel-desc">Customize the visual appearance of the application</p>
            </div>
        </div>

        <form class="settings-form">
            <div class="form-group">
                <label>Theme</label>
                <select class="settings-select w-100">
                    <option>Dark Mode</option>
                    <option>Light Mode</option>
                    <option>System Default</option>
                </select>
            </div>

            <div class="form-group mt-3">
                <label class="mb-2 block">Color Scheme Preview</label>
                <div class="color-scheme-grid">
                    <div class="theme-card active">
                        <div class="theme-bg primary-bg">Primary</div>
                    </div>
                    <div class="theme-card">
                        <div class="theme-bg card-bg">Card</div>
                    </div>
                    <div class="theme-card">
                        <div class="theme-bg muted-bg">Muted</div>
                    </div>
                    <div class="theme-card">
                        <div class="theme-bg accent-bg">Accent</div>
                    </div>
                </div>
            </div>

            <div class="toggle-group mt-4 flex-between">
                <div class="toggle-text">
                    <label class="toggle-label block font-semibold text-sm text-white mb-1">Compact Mode</label>
                    <span class="toggle-desc text-muted text-xs block">Reduce spacing for more content</span>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="toggle-group mt-4 flex-between">
                <div class="toggle-text">
                    <label class="toggle-label block font-semibold text-sm text-white mb-1">Animations</label>
                    <span class="toggle-desc text-muted text-xs block">Enable smooth transitions</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider round"></span>
                </label>
            </div>
        </form>

        <div class="panel-footer mt-4">
            <button type="button" class="btn btn-primary w-100 btn-settings">Save Appearance Settings</button>
        </div>
    </div>
</div>
